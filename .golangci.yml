run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gosec
    - revive
    - misspell

linters-settings:
  gosec:
    excludes:
      - G104   # unhandled errors checked by errcheck
  revive:
    severity: warning
    rules:
      - name: var-naming
      - name: exported
      - name: unused-parameter
      - name: blank-imports
      - name: context-as-argument

issues:
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck]
